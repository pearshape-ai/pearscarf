<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 740" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="aGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9e9e9e"/>
    </marker>
    <marker id="aOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f57f17"/>
    </marker>
    <marker id="aRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="aBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="aPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6a1b9a"/>
    </marker>
    <marker id="aGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <rect width="940" height="740" fill="#fafafa" rx="8"/>
  <text x="470" y="30" text-anchor="middle" font-size="17" font-weight="600" fill="#1a1a2e">PearScarf — System Architecture</text>

  <!-- INTERFACES -->
  <rect x="50" y="50" width="180" height="48" rx="8" fill="#e8eaf6" stroke="#7986cb" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="140" y="72" text-anchor="middle" font-weight="600" fill="#283593">Discord</text>
  <text x="140" y="88" text-anchor="middle" font-size="10" fill="#5c6bc0">thread-per-session</text>

  <rect x="260" y="50" width="180" height="48" rx="8" fill="#e8eaf6" stroke="#7986cb" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="350" y="72" text-anchor="middle" font-weight="600" fill="#283593">Terminal REPL</text>
  <text x="350" y="88" text-anchor="middle" font-size="10" fill="#5c6bc0">session-aware prompt</text>

  <rect x="700" y="50" width="190" height="48" rx="8" fill="#f3e5f5" stroke="#ba68c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="795" y="72" text-anchor="middle" font-weight="600" fill="#6a1b9a">MCP Server</text>
  <text x="795" y="88" text-anchor="middle" font-size="10" fill="#8e24aa">HTTP/SSE - 10 tools</text>

  <!-- Arrows: Discord/REPL → Assistant -->
  <line x1="140" y1="98" x2="260" y2="138" stroke="#7986cb" stroke-width="1.2" marker-end="url(#aGray)"/>
  <line x1="350" y1="98" x2="340" y2="138" stroke="#7986cb" stroke-width="1.2" marker-end="url(#aGray)"/>
  <text x="195" y="122" font-size="9" fill="#757575">Postgres messages</text>

  <!-- Arrow: MCP → context_query -->
  <line x1="795" y1="98" x2="795" y2="300" stroke="#ba68c8" stroke-width="1.2" marker-end="url(#aPurple)"/>
  <text x="818" y="200" font-size="9" fill="#8e24aa">context_query.py</text>

  <!-- WORKER -->
  <rect x="160" y="138" width="360" height="50" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="340" y="160" text-anchor="middle" font-weight="600" fill="#e65100">Assistant</text>
  <text x="340" y="176" text-anchor="middle" font-size="10" fill="#ef6c00">reasoning - routing - triage</text>

  <!-- EXPERT AGENTS -->
  <rect x="30" y="218" width="120" height="48" rx="7" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="90" y="238" text-anchor="middle" font-weight="500" fill="#1565c0">gmailscarf</text>
  <text x="90" y="254" text-anchor="middle" font-size="10" fill="#42a5f5">OAuth API</text>

  <rect x="165" y="218" width="120" height="48" rx="7" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="225" y="238" text-anchor="middle" font-weight="500" fill="#1565c0">linearscarf</text>
  <text x="225" y="254" text-anchor="middle" font-size="10" fill="#42a5f5">GraphQL API</text>

  <rect x="300" y="218" width="120" height="48" rx="7" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="360" y="238" text-anchor="middle" font-weight="500" fill="#1565c0">githubscarf</text>
  <text x="360" y="254" text-anchor="middle" font-size="10" fill="#42a5f5">REST API</text>

  <rect x="435" y="218" width="120" height="48" rx="7" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="495" y="238" text-anchor="middle" font-weight="500" fill="#1565c0">Ingest</text>
  <text x="495" y="254" text-anchor="middle" font-size="10" fill="#42a5f5">seed + JSON</text>

  <rect x="570" y="218" width="120" height="48" rx="7" fill="#e8f5e9" stroke="#81c784" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="630" y="238" text-anchor="middle" font-weight="500" fill="#2e7d32">Retriever</text>
  <text x="630" y="254" text-anchor="middle" font-size="10" fill="#43a047">context_query</text>

  <!-- Arrows: Assistant → Experts -->
  <line x1="200" y1="188" x2="90" y2="218" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="260" y1="188" x2="225" y2="218" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="340" y1="188" x2="360" y2="218" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="420" y1="188" x2="495" y2="218" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="480" y1="188" x2="630" y2="218" stroke="#bdbdbd" stroke-width="1"/>

  <!-- context_query layer -->
  <rect x="480" y="296" width="410" height="32" rx="6" fill="#ede7f6" stroke="#9575cd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="685" y="317" text-anchor="middle" font-size="11" font-weight="500" fill="#4527a0">context_query.py — read-only data access layer</text>

  <!-- Arrows: write experts → storage -->
  <line x1="90" y1="266" x2="90" y2="360" stroke="#1565c0" stroke-width="1" marker-end="url(#aBlue)"/>
  <line x1="225" y1="266" x2="225" y2="360" stroke="#1565c0" stroke-width="1" marker-end="url(#aBlue)"/>
  <line x1="360" y1="266" x2="360" y2="360" stroke="#1565c0" stroke-width="1" marker-end="url(#aBlue)"/>
  <line x1="495" y1="266" x2="495" y2="360" stroke="#1565c0" stroke-width="1" marker-end="url(#aBlue)"/>
  <text x="90" y="338" text-anchor="middle" font-size="9" fill="#1565c0">writes</text>
  <text x="225" y="338" text-anchor="middle" font-size="9" fill="#1565c0">writes</text>
  <text x="360" y="338" text-anchor="middle" font-size="9" fill="#1565c0">writes</text>
  <text x="495" y="338" text-anchor="middle" font-size="9" fill="#1565c0">writes</text>

  <!-- Arrows: retriever → context_query, context_query → storage -->
  <line x1="630" y1="266" x2="630" y2="296" stroke="#2e7d32" stroke-width="1" marker-end="url(#aGreen)"/>
  <text x="640" y="286" font-size="9" fill="#2e7d32">reads</text>
  <line x1="685" y1="328" x2="685" y2="360" stroke="#9575cd" stroke-width="1" marker-end="url(#aGray)"/>
  <text x="695" y="348" font-size="9" fill="#9575cd">reads</text>

  <!-- STORAGE -->
  <rect x="50" y="360" width="840" height="130" rx="10" fill="#eceff1" stroke="#90a4ae" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="470" y="382" text-anchor="middle" font-weight="600" font-size="14" fill="#37474f">Storage</text>

  <rect x="75" y="394" width="240" height="82" rx="6" fill="#fff" stroke="#78909c" stroke-width="1"/>
  <text x="195" y="413" text-anchor="middle" font-weight="600" fill="#37474f">Postgres</text>
  <text x="195" y="429" text-anchor="middle" font-size="10" fill="#607d8b">records + typed tables</text>
  <text x="195" y="443" text-anchor="middle" font-size="10" fill="#607d8b">sessions - messages</text>
  <text x="195" y="457" text-anchor="middle" font-size="10" fill="#607d8b">experts - curator_queue - mcp_keys</text>

  <rect x="340" y="394" width="240" height="82" rx="6" fill="#fff" stroke="#78909c" stroke-width="1"/>
  <text x="460" y="413" text-anchor="middle" font-weight="600" fill="#37474f">Neo4j</text>
  <text x="460" y="429" text-anchor="middle" font-size="10" fill="#607d8b">Person - Company - Project</text>
  <text x="460" y="443" text-anchor="middle" font-size="10" fill="#607d8b">Event - Repository - Day</text>
  <text x="460" y="457" text-anchor="middle" font-size="10" fill="#607d8b">AFFILIATED - ASSERTED - TRANSITIONED</text>

  <rect x="605" y="394" width="260" height="82" rx="6" fill="#fff" stroke="#78909c" stroke-width="1"/>
  <text x="735" y="413" text-anchor="middle" font-weight="600" fill="#37474f">Qdrant</text>
  <text x="735" y="429" text-anchor="middle" font-size="10" fill="#607d8b">vector embeddings</text>
  <text x="735" y="443" text-anchor="middle" font-size="10" fill="#607d8b">all-MiniLM-L6-v2</text>
  <text x="735" y="457" text-anchor="middle" font-size="10" fill="#607d8b">semantic similarity search</text>

  <!-- BACKGROUND WORKERS -->
  <text x="470" y="528" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">Background Workers</text>

  <rect x="130" y="544" width="270" height="84" rx="8" fill="#fff8e1" stroke="#ffd54f" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="265" y="568" text-anchor="middle" font-weight="600" fill="#f57f17">Extraction</text>
  <text x="265" y="585" text-anchor="middle" font-size="10" fill="#f9a825">LLM extraction - entity resolution</text>
  <text x="265" y="599" text-anchor="middle" font-size="10" fill="#f9a825">fact-edge writes - Qdrant embedding</text>
  <text x="265" y="613" text-anchor="middle" font-size="10" fill="#f9a825">enqueues to curator_queue</text>

  <rect x="540" y="544" width="270" height="84" rx="8" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="675" y="568" text-anchor="middle" font-weight="600" fill="#c62828">Curation</text>
  <text x="675" y="585" text-anchor="middle" font-size="10" fill="#e53935">AFFILIATED + ASSERTED dedup</text>
  <text x="675" y="599" text-anchor="middle" font-size="10" fill="#e53935">expired commitment detection</text>
  <text x="675" y="613" text-anchor="middle" font-size="10" fill="#e53935">confidence upgrades</text>

  <!-- Workers → Storage -->
  <line x1="265" y1="544" x2="265" y2="490" stroke="#f57f17" stroke-width="1.2" marker-end="url(#aOrange)"/>
  <text x="275" y="520" font-size="9" fill="#f57f17">writes</text>
  <line x1="675" y1="544" x2="675" y2="490" stroke="#c62828" stroke-width="1.2" marker-end="url(#aRed)"/>
  <text x="685" y="520" font-size="9" fill="#c62828">writes</text>

  <!-- Extraction → Curation -->
  <line x1="400" y1="586" x2="540" y2="586" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#aGray)"/>
  <text x="470" y="578" text-anchor="middle" font-size="9" fill="#757575">curator_queue</text>

  <!-- LEGEND -->
  <rect x="50" y="660" width="840" height="60" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="70" y="682" width="12" height="12" rx="3" fill="#e8eaf6" stroke="#7986cb"/>
  <text x="88" y="693" font-size="10" fill="#616161">Interface</text>
  <rect x="160" y="682" width="12" height="12" rx="3" fill="#e3f2fd" stroke="#64b5f6"/>
  <text x="178" y="693" font-size="10" fill="#616161">Expert</text>
  <rect x="235" y="682" width="12" height="12" rx="3" fill="#e8f5e9" stroke="#81c784"/>
  <text x="253" y="693" font-size="10" fill="#616161">Read Path</text>
  <rect x="325" y="682" width="12" height="12" rx="3" fill="#f3e5f5" stroke="#ba68c8"/>
  <text x="343" y="693" font-size="10" fill="#616161">MCP</text>
  <rect x="395" y="682" width="12" height="12" rx="3" fill="#fff8e1" stroke="#ffd54f"/>
  <text x="413" y="693" font-size="10" fill="#616161">Extraction</text>
  <rect x="475" y="682" width="12" height="12" rx="3" fill="#fce4ec" stroke="#f48fb1"/>
  <text x="493" y="693" font-size="10" fill="#616161">Curation</text>
  <rect x="555" y="682" width="12" height="12" rx="3" fill="#eceff1" stroke="#90a4ae"/>
  <text x="573" y="693" font-size="10" fill="#616161">Storage</text>
  <rect x="635" y="682" width="12" height="12" rx="3" fill="#ede7f6" stroke="#9575cd"/>
  <text x="653" y="693" font-size="10" fill="#616161">Query Layer</text>
</svg>