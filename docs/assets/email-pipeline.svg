<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 620" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="aGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9e9e9e"/>
    </marker>
    <marker id="aBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="aOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f57f17"/>
    </marker>
    <marker id="aGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <rect width="700" height="620" fill="#fafafa" rx="8"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a2e">Email Pipeline</text>

  <!-- New email -->
  <rect x="250" y="44" width="200" height="36" rx="6" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="350" y="67" text-anchor="middle" font-weight="500" fill="#1565c0">New email arrives</text>

  <line x1="350" y1="80" x2="350" y2="106" stroke="#9e9e9e" stroke-width="1.2" marker-end="url(#aGray)"/>

  <!-- Gmail Expert -->
  <rect x="220" y="108" width="260" height="48" rx="8" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="350" y="130" text-anchor="middle" font-weight="600" fill="#1565c0">Gmail Expert</text>
  <text x="350" y="146" text-anchor="middle" font-size="10" fill="#42a5f5">OAuth API · polls unread</text>

  <!-- Two arrows out of Gmail: left to Worker, right to SOR -->
  <line x1="280" y1="156" x2="200" y2="196" stroke="#9e9e9e" stroke-width="1.2" marker-end="url(#aGray)"/>
  <text x="215" y="178" font-size="9" fill="#757575">bus message</text>

  <line x1="420" y1="156" x2="540" y2="196" stroke="#1565c0" stroke-width="1.2" marker-end="url(#aBlue)"/>
  <text x="505" y="178" font-size="9" fill="#1565c0">save_email()</text>

  <!-- Worker (triage) -->
  <rect x="80" y="198" width="240" height="48" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="200" y="218" text-anchor="middle" font-weight="600" fill="#e65100">Worker (triage)</text>
  <text x="200" y="234" text-anchor="middle" font-size="10" fill="#ef6c00">classify: relevant / noise / ask human</text>

  <!-- SOR box -->
  <rect x="460" y="198" width="200" height="48" rx="8" fill="#eceff1" stroke="#90a4ae" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="560" y="218" text-anchor="middle" font-weight="600" fill="#37474f">Postgres SOR</text>
  <text x="560" y="234" text-anchor="middle" font-size="10" fill="#607d8b">records + emails tables</text>

  <!-- Triage decision branches -->
  <line x1="200" y1="246" x2="200" y2="280" stroke="#9e9e9e" stroke-width="1.2" marker-end="url(#aGray)"/>

  <rect x="40" y="282" width="320" height="74" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="200" y="302" text-anchor="middle" font-weight="500" fill="#424242">Classification</text>
  <text x="60" y="320" font-size="11" fill="#2e7d32">Known entity → auto: relevant</text>
  <text x="60" y="336" font-size="11" fill="#c62828">Obvious noise → auto: noise</text>
  <text x="60" y="352" font-size="11" fill="#f57f17">Uncertain → ask human in Discord/REPL</text>

  <!-- Arrow: classification stored -->
  <line x1="360" y1="320" x2="460" y2="230" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#aGray)"/>
  <text x="430" y="268" font-size="9" fill="#757575">classification</text>
  <text x="430" y="280" font-size="9" fill="#757575">stored on record</text>

  <!-- Arrow down: if relevant -->
  <line x1="200" y1="356" x2="200" y2="400" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#aGreen)"/>
  <text x="210" y="383" font-size="10" fill="#2e7d32">if relevant</text>

  <!-- Indexer -->
  <rect x="100" y="402" width="280" height="70" rx="8" fill="#fff8e1" stroke="#ffd54f" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="240" y="424" text-anchor="middle" font-weight="600" fill="#f57f17">Indexer (background)</text>
  <text x="240" y="442" text-anchor="middle" font-size="10" fill="#f9a825">LLM extraction → entities + fact-edges</text>
  <text x="240" y="456" text-anchor="middle" font-size="10" fill="#f9a825">entity resolution → Neo4j writes → Qdrant embed</text>

  <!-- Arrows from Indexer to storage -->
  <line x1="240" y1="472" x2="240" y2="510" stroke="#f57f17" stroke-width="1.2" marker-end="url(#aOrange)"/>

  <!-- Storage row -->
  <rect x="60" y="512" width="140" height="40" rx="6" fill="#eceff1" stroke="#90a4ae" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="537" text-anchor="middle" font-weight="500" fill="#37474f">Neo4j</text>

  <rect x="220" y="512" width="140" height="40" rx="6" fill="#eceff1" stroke="#90a4ae" stroke-width="1" filter="url(#shadow)"/>
  <text x="290" y="537" text-anchor="middle" font-weight="500" fill="#37474f">Qdrant</text>

  <rect x="380" y="512" width="180" height="40" rx="6" fill="#eceff1" stroke="#90a4ae" stroke-width="1" filter="url(#shadow)"/>
  <text x="470" y="537" text-anchor="middle" font-weight="500" fill="#37474f">curator_queue</text>

  <!-- Indexer → curator_queue -->
  <line x1="340" y1="460" x2="470" y2="512" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#aGray)"/>
  <text x="425" y="485" font-size="9" fill="#757575">enqueue</text>

  <!-- Indexer → Neo4j -->
  <line x1="160" y1="472" x2="130" y2="512" stroke="#f57f17" stroke-width="1" marker-end="url(#aOrange)"/>

  <!-- Indexer → Qdrant -->
  <line x1="260" y1="472" x2="290" y2="512" stroke="#f57f17" stroke-width="1" marker-end="url(#aOrange)"/>

  <!-- Mark indexed -->
  <line x1="380" y1="436" x2="460" y2="230" stroke="#9e9e9e" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="448" y="340" font-size="9" fill="#757575" transform="rotate(-55,448,340)">mark indexed=TRUE</text>

  <!-- Triage bypass note -->
  <rect x="40" y="570" width="620" height="34" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="350" y="591" text-anchor="middle" font-size="11" fill="#2e7d32">Ingest records and issue_change records bypass triage — auto-classified as relevant on save</text>
</svg>