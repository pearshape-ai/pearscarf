[project]
name = "pearscaff"
dynamic = ["version"]
description = "Operational infrastructure that grows itself"
requires-python = ">=3.12"
dependencies = [
    "anthropic",
    "click",
    "discord.py",
    "google-api-python-client",
    "google-auth-oauthlib",
    "httpx",
    "langsmith",
    "neo4j",
    "playwright",
    "psycopg[binary]",
    "psycopg-pool",
    "qdrant-client",
    "python-dotenv",
    "sentence-transformers",
]

[project.scripts]
pearscaff = "pearscaff.cli:cli"
ps = "pearscaff.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "pearscaff/__init__.py"
