[project]
name = "pearscaff"
version = "0.1.0"
description = "Operational infrastructure that grows itself"
requires-python = ">=3.12"
dependencies = [
    "anthropic",
    "click",
    "discord.py",
    "httpx",
    "playwright",
    "python-dotenv",
]

[project.scripts]
pearscaff = "pearscaff.cli:cli"
ps = "pearscaff.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
