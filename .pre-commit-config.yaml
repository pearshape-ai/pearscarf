# Hooks that run before each git commit. Install with `uv run pre-commit install`.
# Run manually across the whole repo with `uv run pre-commit run --all-files`.
# The same checks run in CI on every pull request.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Run mypy through the project's own venv so pre-commit, local
      # `uv run mypy`, and CI all see the exact same dep set and produce
      # the exact same diagnostics. Avoids the divergence between the
      # mirrors-mypy hook (a minimal isolated env) and the project's
      # actual transitive types.
      - id: mypy
        name: mypy (project venv)
        entry: uv run mypy
        language: system
        files: ^pearscarf/
        pass_filenames: false
        args: [pearscarf/]
